<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureChat Simple — E2EE Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1419;
      --surface: #1a1f2e;
      --primary: #4a9eff;
      --primary-dark: #357abd;
      --text: #e4e6eb;
      --text-muted: #8b92a8;
      --border: #2a3141;
      --success: #4caf82;
      --danger: #ef5350;
      --warning: #ffa726;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ════════════════════════════════════════════════════════
       AUTH SCREEN
    ════════════════════════════════════════════════════════ */
    #auth-screen {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
    }

    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2.5rem;
    }

    .auth-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-logo h1 {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .auth-logo p {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      padding: 0.75rem;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab-btn:hover {
      color: var(--text);
    }

    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus {
      border-color: var(--primary);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .btn-primary {
      width: 100%;
      padding: 0.85rem;
      background: var(--primary);
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-primary:disabled {
      background: var(--border);
      cursor: not-allowed;
    }

    .error-msg {
      background: rgba(239, 83, 80, 0.1);
      border-left: 3px solid var(--danger);
      color: var(--danger);
      padding: 0.75rem 1rem;
      margin-top: 1rem;
      border-radius: 4px;
      font-size: 0.85rem;
      display: none;
    }

    .success-msg {
      background: rgba(76, 175, 130, 0.1);
      border-left: 3px solid var(--success);
      color: var(--success);
    }

    .crypto-note {
      margin-top: 1.5rem;
      padding: 1rem;
      background: rgba(74, 158, 255, 0.05);
      border: 1px solid rgba(74, 158, 255, 0.2);
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ════════════════════════════════════════════════════════
       APP SCREEN
    ════════════════════════════════════════════════════════ */
    #app-screen {
      display: none;
      width: 100%;
      height: 100vh;
      flex-direction: row;
    }

    /* Sidebar */
    .sidebar {
      width: 300px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-size: 1.2rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .user-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .btn-logout {
      padding: 0.4rem 0.8rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .btn-logout:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .contacts-list {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
    }

    .contact-item {
      padding: 1rem;
      margin-bottom: 0.5rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .contact-item:hover {
      border-color: var(--primary);
    }

    .contact-item.active {
      background: rgba(74, 158, 255, 0.1);
      border-color: var(--primary);
    }

    .avatar {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 1.1rem;
      color: white;
      position: relative;
    }

    .online-dot {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 10px;
      height: 10px;
      background: var(--success);
      border: 2px solid var(--surface);
      border-radius: 50%;
    }

    .contact-name {
      font-weight: 500;
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg);
    }

    .chat-header {
      padding: 1.5rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .chat-contact {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .chat-contact h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .e2ee-badge {
      padding: 0.4rem 0.8rem;
      background: rgba(76, 175, 130, 0.1);
      border: 1px solid rgba(76, 175, 130, 0.3);
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--success);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .message {
      max-width: 70%;
      display: flex;
      flex-direction: column;
    }

    .message.sent {
      align-self: flex-end;
    }

    .message.received {
      align-self: flex-start;
    }

    .message-content {
      padding: 0.85rem 1.2rem;
      border-radius: 12px;
      font-size: 0.95rem;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .sent .message-content {
      background: var(--primary);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .received .message-content {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message-meta {
      margin-top: 0.4rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .sent .message-meta {
      justify-content: flex-end;
    }

    .hash-indicator {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      cursor: help;
    }

    .hash-indicator.verified {
      color: var(--success);
    }

    .hash-indicator.failed {
      color: var(--danger);
    }

    .chat-input {
      padding: 1.5rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 1rem;
    }

    .chat-input input {
      flex: 1;
      background: var(--bg);
    }

    .btn-send {
      padding: 0 2rem;
      background: var(--primary);
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-send:hover {
      background: var(--primary-dark);
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      stroke: var(--border);
    }
  </style>
</head>

<body>

  <!-- AUTH SCREEN -->
  <div id="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <h1> SecureChat Simple</h1>
        <p>SHA-256 · RSA-2048 · AES-GCM</p>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn" onclick="switchTab('register')">Registro</button>
      </div>

      <!-- Login -->
      <div id="tab-login">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="login-username" placeholder="Tu username" />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="login-password" placeholder="Tu password" />
        </div>
        <button class="btn-primary" onclick="handleLogin()">Ingresar</button>
        <div class="error-msg" id="login-error"></div>
      </div>

      <!-- Register -->
      <div id="tab-register" style="display:none">
        <div class="form-group">
          <label>Usuario</label>
          <input type="text" id="reg-username" placeholder="Elige un username" />
        </div>
        <div class="form-group">
          <label>Contraseña</label>
          <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" />
        </div>
        <button class="btn-primary" onclick="handleRegister()">Crear cuenta</button>
        <div class="error-msg" id="reg-error"></div>
        <div class="crypto-note">
          Se generará un par de claves RSA-2048<br>
          en tu navegador (la privada NUNCA sale)
        </div>
      </div>
    </div>
  </div>

  <!-- APP SCREEN -->
  <div id="app-screen">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>Contactos</h2>
        <div class="user-info">
          <span id="current-username">—</span>
          <button class="btn-logout" onclick="handleLogout()">Salir</button>
        </div>
      </div>
      <div class="contacts-list" id="contacts-list">
        <div style="padding:2rem;text-align:center;color:var(--text-muted);">
          Cargando...
        </div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
        <p>Selecciona un contacto para chatear</p>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3001/api';

    let state = {
      userId: null,
      username: null,
      privateKey: null,
      publicKey: null,
      currentChat: null,
      users: [],
      pollInterval: null,
    };

    // ═══════════════════════════════════════════════════════════
    //  [SHA-256] Hash functions
    // ═══════════════════════════════════════════════════════════
    async function sha256(text) {
      const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return Array.from(new Uint8Array(buffer))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    // ═══════════════════════════════════════════════════════════
    //  [RSA-2048] Key generation
    // ═══════════════════════════════════════════════════════════
    async function generateRSAKeys() {
      const keyPair = await crypto.subtle.generateKey(
        {
          name: 'RSA-OAEP',
          modulusLength: 2048,
          publicExponent: new Uint8Array([1, 0, 1]),
          hash: 'SHA-256'
        },
        true,
        ['encrypt', 'decrypt']
      );

      const publicKeyBuffer = await crypto.subtle.exportKey('spki', keyPair.publicKey);
      const publicKeyBase64 = btoa(String.fromCharCode(...new Uint8Array(publicKeyBuffer)));

      const privateKeyBuffer = await crypto.subtle.exportKey('pkcs8', keyPair.privateKey);
      const privateKeyBase64 = btoa(String.fromCharCode(...new Uint8Array(privateKeyBuffer)));

      return {
        publicKey: keyPair.publicKey,
        privateKey: keyPair.privateKey,
        publicKeyBase64,
        privateKeyBase64
      };
    }

    async function importPublicKey(base64) {
      const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
      return await crypto.subtle.importKey(
        'spki',
        bytes.buffer,
        { name: 'RSA-OAEP', hash: 'SHA-256' },
        false,
        ['encrypt']
      );
    }

    async function importPrivateKey(base64) {
      const bytes = Uint8Array.from(atob(base64), c => c.charCodeAt(0));
      return await crypto.subtle.importKey(
        'pkcs8',
        bytes.buffer,
        { name: 'RSA-OAEP', hash: 'SHA-256' },
        false,
        ['decrypt']
      );
    }

    // ═══════════════════════════════════════════════════════════
    //  [AES-GCM] Encrypt / Decrypt
    // ═══════════════════════════════════════════════════════════
    async function encryptMessage(plaintext, recipientPublicKey, senderPublicKey) {
      // Generar clave AES efímera
      const aesKey = await crypto.subtle.generateKey(
        { name: 'AES-GCM', length: 256 },
        true,
        ['encrypt']
      );

      // Cifrar mensaje con AES
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const cipherBuffer = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        aesKey,
        new TextEncoder().encode(plaintext)
      );

      // Cifrar clave AES con RSA del destinatario y del remitente
      const aesKeyRaw = await crypto.subtle.exportKey('raw', aesKey);
      const encryptedKeyRecipient = await crypto.subtle.encrypt(
        { name: 'RSA-OAEP' },
        recipientPublicKey,
        aesKeyRaw
      );
      const encryptedKeySender = await crypto.subtle.encrypt(
        { name: 'RSA-OAEP' },
        senderPublicKey,
        aesKeyRaw
      );

      // Hash del mensaje original
      const messageHash = await sha256(plaintext);

      // Empaquetar el IV junto con el contenido cifrado para no modificar la Base de Datos
      const combinedIvAndCipher = new Uint8Array(12 + cipherBuffer.byteLength);
      combinedIvAndCipher.set(iv, 0);
      combinedIvAndCipher.set(new Uint8Array(cipherBuffer), 12);

      // Empaquetar ambas llaves como un JSON text en la columna encrypted_key
      const combinedKeys = JSON.stringify({
        recipient: arrayBufferToBase64(encryptedKeyRecipient),
        sender: arrayBufferToBase64(encryptedKeySender)
      });

      return {
        contentEncrypted: arrayBufferToBase64(combinedIvAndCipher.buffer),
        encryptedKey: combinedKeys,
        messageHash
      };
    }

    async function decryptMessage(msg, myPrivateKey) {
      try {
        // Extraer la llave correcta del JSON string guardado en la BD
        const keys = JSON.parse(msg.encrypted_key);
        const myEncryptedKeyB64 = (msg.sender_id === state.userId) ? keys.sender : keys.recipient;

        // Descifrar clave AES con mi RSA privada
        const aesKeyRaw = await crypto.subtle.decrypt(
          { name: 'RSA-OAEP' },
          myPrivateKey,
          base64ToArrayBuffer(myEncryptedKeyB64)
        );

        // Importar clave AES
        const aesKey = await crypto.subtle.importKey(
          'raw',
          aesKeyRaw,
          { name: 'AES-GCM', length: 256 },
          false,
          ['decrypt']
        );

        // Extraer el IV y el cipherText del content_encrypted empaquetado
        const combinedIvAndCipher = new Uint8Array(base64ToArrayBuffer(msg.content_encrypted));
        const iv = combinedIvAndCipher.slice(0, 12);
        const cipherText = combinedIvAndCipher.slice(12);

        // Descifrar mensaje
        const plainBuffer = await crypto.subtle.decrypt(
          { name: 'AES-GCM', iv },
          aesKey,
          cipherText
        );

        const plaintext = new TextDecoder().decode(plainBuffer);

        // Verificar hash
        const computedHash = await sha256(plaintext);
        const hashOk = computedHash === msg.message_hash;

        return { plaintext, hashOk, hash: computedHash };
      } catch (e) {
        console.error('Error descifrando:', e);
        return { plaintext: '[Error al descifrar]', hashOk: false, hash: '' };
      }
    }

    function arrayBufferToBase64(buffer) {
      return btoa(String.fromCharCode(...new Uint8Array(buffer)));
    }

    function base64ToArrayBuffer(base64) {
      return Uint8Array.from(atob(base64), c => c.charCodeAt(0)).buffer;
    }

    // ═══════════════════════════════════════════════════════════
    //  AUTH
    // ═══════════════════════════════════════════════════════════
    function switchTab(tab) {
      document.getElementById('tab-login').style.display = tab === 'login' ? '' : 'none';
      document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
      document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
      });
    }

    async function handleRegister() {
      const username = document.getElementById('reg-username').value.trim();
      const password = document.getElementById('reg-password').value;
      const errorEl = document.getElementById('reg-error');

      errorEl.style.display = 'none';

      if (!username || !password) {
        return showError(errorEl, 'Completa todos los campos');
      }

      try {
        // Generar par de claves RSA
        const keys = await generateRSAKeys();

        // Registrar usuario
        const res = await fetch(`${API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username,
            password,
            publicKey: keys.publicKeyBase64
          })
        });

        const data = await res.json();

        if (!res.ok) {
          return showError(errorEl, data.error);
        }

        // Guardar clave privada en sessionStorage
        sessionStorage.setItem(`pk_${username}`, keys.privateKeyBase64);

        showSuccess(errorEl, ' Cuenta creada. Puedes iniciar sesión.');
        setTimeout(() => {
          switchTab('login');
          document.getElementById('login-username').value = username;
        }, 1500);

      } catch (e) {
        showError(errorEl, 'Error: ' + e.message);
      }
    }

    async function handleLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      const errorEl = document.getElementById('login-error');

      errorEl.style.display = 'none';

      if (!username || !password) {
        return showError(errorEl, 'Completa todos los campos');
      }

      try {
        const res = await fetch(`${API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (!res.ok) {
          return showError(errorEl, data.error);
        }

        // Recuperar clave privada
        const privateKeyBase64 = sessionStorage.getItem(`pk_${username}`);
        if (!privateKeyBase64) {
          return showError(errorEl, 'Clave privada no encontrada. ¿Te registraste en este dispositivo?');
        }

        // Configurar estado
        state.userId = data.userId;
        state.username = data.username;
        state.privateKey = await importPrivateKey(privateKeyBase64);
        state.publicKey = await importPublicKey(data.publicKey);

        showApp();

      } catch (e) {
        showError(errorEl, 'Error: ' + e.message);
      }
    }

    async function handleLogout() {
      await fetch(`${API}/logout`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: state.userId })
      }).catch(() => { });

      clearInterval(state.pollInterval);

      state = {
        userId: null,
        username: null,
        privateKey: null,
        publicKey: null,
        currentChat: null,
        users: [],
        pollInterval: null
      };

      document.getElementById('app-screen').style.display = 'none';
      document.getElementById('auth-screen').style.display = '';
    }

    // ═══════════════════════════════════════════════════════════
    //  APP UI
    // ═══════════════════════════════════════════════════════════
    function showApp() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('app-screen').style.display = 'flex';
      document.getElementById('current-username').textContent = state.username;

      loadUsers();
      state.pollInterval = setInterval(async () => {
        await loadUsers();
        if (state.currentChat) {
          await loadMessages();
        }
      }, 3000);
    }

    async function loadUsers() {
      try {
        const res = await fetch(`${API}/users/${state.userId}`);
        state.users = await res.json();
        renderContacts();
      } catch (e) {
        console.error('Error cargando usuarios:', e);
      }
    }

    function renderContacts() {
      const list = document.getElementById('contacts-list');

      if (!state.users.length) {
        list.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-muted);">No hay otros usuarios</div>';
        return;
      }

      list.innerHTML = state.users.map(user => `
    <div class="contact-item ${state.currentChat?.userId === user.id ? 'active' : ''}"
         onclick='openChat(${JSON.stringify(user)})'>
      <div class="avatar">
        ${user.username[0].toUpperCase()}
        ${user.is_online ? '<div class="online-dot"></div>' : ''}
      </div>
      <div class="contact-name">${user.username}</div>
    </div>
  `).join('');
    }

    async function openChat(user) {
      state.currentChat = {
        userId: user.id,
        username: user.username,
        publicKey: await importPublicKey(user.public_key)
      };

      renderContacts();
      renderChatArea();
      loadMessages();
    }

    function renderChatArea() {
      const chatArea = document.querySelector('.chat-area');
      chatArea.innerHTML = `
    <div class="chat-header">
      <div class="chat-contact">
        <div class="avatar">${state.currentChat.username[0].toUpperCase()}</div>
        <h3>${state.currentChat.username}</h3>
      </div>
      <div class="e2ee-badge">
        🔒 E2EE activo
      </div>
    </div>
    <div class="messages-container" id="messages-container">
      <div style="text-align:center;color:var(--text-muted);padding:2rem;">
        Cargando mensajes...
      </div>
    </div>
    <div class="chat-input">
      <input type="text" id="msg-input" 
             placeholder="Escribe tu mensaje (se cifrará con AES-256-GCM)"
             onkeypress="if(event.key==='Enter')sendMessage()" />
      <button class="btn-send" onclick="sendMessage()">Enviar</button>
    </div>
  `;
    }

    async function loadMessages() {
      if (!state.currentChat) return;

      try {
        const res = await fetch(`${API}/messages/${state.userId}/${state.currentChat.userId}`);
        const messages = await res.json();
        await renderMessages(messages);
      } catch (e) {
        console.error('Error cargando mensajes:', e);
      }
    }

    async function renderMessages(messages) {
      const container = document.getElementById('messages-container');
      if (!container) return;

      if (!messages.length) {
        container.innerHTML = '<div class="empty-state"><p>No hay mensajes. ¡Inicia la conversación!</p></div>';
        return;
      }

      const rendered = await Promise.all(messages.map(async msg => {
        const isSent = msg.sender_id === state.userId;
        const { plaintext, hashOk, hash } = await decryptMessage(msg, state.privateKey);
        const time = new Date(msg.sent_at).toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });

        return `
      <div class="message ${isSent ? 'sent' : 'received'}">
        <div class="message-content">${escapeHtml(plaintext)}</div>
        <div class="message-meta">
          <span>${time}</span>
          <span class="hash-indicator ${hashOk ? 'verified' : 'failed'}" 
                title="SHA-256: ${hash}">
            ${hash.substring(0, 8)}... ${hashOk ? '✓' : '✗'}
          </span>
        </div>
      </div>
    `;
      }));

      container.innerHTML = rendered.join('');
      container.scrollTop = container.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input?.value.trim();

      if (!text || !state.currentChat) return;

      input.value = '';
      input.disabled = true;

      try {
        const encrypted = await encryptMessage(text, state.currentChat.publicKey, state.publicKey);

        await fetch(`${API}/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            senderId: state.userId,
            recipientId: state.currentChat.userId,
            contentEncrypted: encrypted.contentEncrypted,
            encryptedKey: encrypted.encryptedKey,
            messageHash: encrypted.messageHash
          })
        });

        await loadMessages();

      } catch (e) {
        console.error('Error enviando mensaje:', e);
      } finally {
        input.disabled = false;
        input.focus();
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  UTILITIES
    // ═══════════════════════════════════════════════════════════
    function showError(el, msg) {
      el.textContent = msg;
      el.style.display = 'block';
      el.classList.remove('success-msg');
    }

    function showSuccess(el, msg) {
      el.textContent = msg;
      el.style.display = 'block';
      el.classList.add('success-msg');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>

</html>
